services:
  - type: web
    name: voicemed-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: VOICEMED_ASR_MODE
        value: whisper
      - key: DATABASE_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      # Comma-separated allowlist of frontend origins (CORS) — REQUIRED in
      # production or browsers will block the deployed frontend.
      # e.g. https://medvoice.vercel.app
      - key: FRONTEND_ORIGINS
        sync: false
